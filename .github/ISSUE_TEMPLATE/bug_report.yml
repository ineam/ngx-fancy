name: 🐛 Bug report
description: Report something that is broken
title: "fix: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve the project 🛠️

        Please search existing issues before filing a new bug report.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug and what you observed.
      placeholder: The component...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the steps needed to reproduce the bug.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected vs actual behavior
      description: Explain what you expected and what actually happened.
      placeholder: Expected...
    validations:
      required: true

  - type: input
    id: library-version
    attributes:
      label: ngx-fancier version
      placeholder: e.g. 1.1.12
    validations:
      required: true

  - type: input
    id: angular-version
    attributes:
      label: Angular version
      placeholder: e.g. 22.0.0
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues for duplicates.
          required: true
        - label: I can reproduce this on the latest version.
          required: true
